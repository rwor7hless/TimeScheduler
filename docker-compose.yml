services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: timescheduler
      POSTGRES_USER: ts_user
      POSTGRES_PASSWORD: ts_secure_pass_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ts_user -d timescheduler"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ts_user:ts_secure_pass_2026@db:5432/timescheduler
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backups:/app/backups

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
